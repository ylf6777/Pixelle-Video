# ylf_Video Nginx 反向代理配置
#
# 功能:
#   1. 反向代理到 FastAPI (uvicorn)
#   2. SSE 端点禁用缓冲（进度实时推送）
#   3. 静态资源缓存策略
#   4. Gzip 压缩
#   5. 安全头
#
# 部署:
#   cp deploy/nginx.conf /etc/nginx/sites-available/ylf_video
#   ln -s /etc/nginx/sites-available/ylf_video /etc/nginx/sites-enabled/
#   nginx -t && nginx -s reload

upstream ylf_video_backend {
    server 127.0.0.1:8000;
    keepalive 32;
}

server {
    listen 80;
    server_name your-domain.com;  # 替换为实际域名

    # 日志
    access_log /var/log/nginx/ylf_video_access.log;
    error_log  /var/log/nginx/ylf_video_error.log;

    # 客户端上传大小限制
    client_max_body_size 50m;

    # Gzip 压缩
    gzip on;
    gzip_types text/css application/javascript text/html application/json;
    gzip_min_length 512;

    # ========== SSE 端点 — 必须禁用缓冲 ==========
    location ~ ^/api/workflows/.+/progress/ {
        proxy_pass http://ylf_video_backend;

        # SSE 核心配置
        proxy_buffering off;          # 禁用缓冲
        proxy_cache off;              # 禁用缓存
        proxy_set_header Connection '';
        proxy_http_version 1.1;       # HTTP/1.1 支持分块传输
        chunked_transfer_encoding on;

        # 超长超时（工作流可能运行数分钟）
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }

    # ========== API 端点 ==========
    location /api/ {
        proxy_pass http://ylf_video_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # ========== 静态资源 — 长期缓存 ==========
    location /static/ {
        alias /opt/ylf_video/web_ui/static/;

        # CSS/JS 文件指纹化后可强制缓存 1 年
        expires 1y;
        add_header Cache-Control "public, immutable";

        # 图片
        location ~* \.(png|jpg|webp|svg|ico)$ {
            expires 30d;
            add_header Cache-Control "public";
        }
    }

    # ========== 页面路由 ==========
    location / {
        proxy_pass http://ylf_video_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ========== 安全头 ==========
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}
