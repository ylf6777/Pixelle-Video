{# 主页 — 作品展示 + 上传入口 #}
{% extends "base.html" %}
{% block content %}

<div class="pv-browser">
  <div class="pv-showcase-header">
    <h2 class="pv-showcase__title">作品展示</h2>
    <p class="pv-showcase__subtitle">原创作品 · 上传即展示</p>
    <a href="/upload" class="pv-btn pv-btn--gradient pv-btn--upload">📤 上传作品</a>
  </div>

  {# 已上传作品画廊 #}
  <section class="pv-gallery" x-data="galleryLoader()" x-init="init()">
    <div class="pv-masonry" id="gallery-grid">
      <template x-for="w in works" :key="w.work_id">
        <div class="pv-card pv-card--work">
          <div class="pv-card__thumb">
            <img x-show="w.media_type==='image'" :src="thumbUrl(w)"
                 alt="" loading="lazy" class="pv-card__thumb-img">
            <video x-show="w.media_type==='video'" :src="thumbUrl(w)"
                   muted loop playsinline class="pv-card__thumb-img"></video>
            <div class="pv-card__thumb-grad" x-show="!w.file_path"></div>
          </div>
          <div class="pv-card__body">
            <h3 class="pv-card__title" x-text="w.title"></h3>
            <p class="pv-card__author" x-text="w.author"></p>
            <p class="pv-card__date" x-text="formatDate(w.created_at)"></p>
            <span class="pv-card__type-tag" x-show="w.category" x-text="w.category"></span>
          </div>
        </div>
      </template>
    </div>

    <div class="pv-empty" x-show="works.length === 0 && !loading">
      <div class="pv-empty__icon">🎨</div>
      <h2 class="pv-empty__title">暂无作品</h2>
      <p class="pv-empty__text">成为第一位上传原创作品的创作者</p>
    </div>

    <div class="pv-load-more" x-show="hasMore">
      <button x-show="!loading" @click="loadMore()" class="pv-btn pv-btn--secondary">加载更多</button>
      <div x-show="loading" class="pv-load-more__spinner">加载中...</div>
    </div>
  </section>
</div>

<script>
document.addEventListener('alpine:init', () => {
  Alpine.data('galleryLoader', () => ({
    works: [], page: 1, total: 0, hasMore: true, loading: false,
    async init() {
      const sentinel = this.$el.querySelector('.pv-load-more');
      if (sentinel) {
        new IntersectionObserver((entries) => {
          if (entries[0].isIntersecting && this.hasMore && !this.loading) this.loadMore();
        }, { rootMargin: '200px' }).observe(sentinel);
      }
      await this.loadMore();
    },
    async loadMore() {
      this.loading = true;
      try {
        const r = await fetch(`/api/works/uploaded?page=${this.page}&page_size=12`);
        const d = await r.json();
        this.works = [...this.works, ...(d.works || [])];
        this.total = d.total;
        this.hasMore = this.page < (d.total_pages || 1);
        this.page++;
      } catch(e) { console.error(e); }
      this.loading = false;
    },
    thumbUrl(w) {
      if (!w.file_path) return '';
      const name = w.file_path.replace(/\\/g,'/').split('/').pop();
      return '/works/' + w.work_id + '/' + name;
    },
    formatDate(d) { return d ? d.substring(0, 10) : ''; }
  }));
});
</script>
{% endblock %}
