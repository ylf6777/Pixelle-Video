{# 顶部导航栏 #}
<nav class="pv-navbar" role="navigation" aria-label="主导航"
     x-data="{ theme: localStorage.getItem('pv-theme') || 'dark' }"
     :class="theme === 'dark' ? 'pv-navbar--dark' : 'pv-navbar--light'">
  <div class="pv-navbar__inner">
    <a href="/" class="pv-navbar__brand" aria-label="ylf_Video 首页">
      <svg class="pv-navbar__logo" width="28" height="28" viewBox="0 0 32 32" fill="none" aria-hidden="true">
        <rect width="32" height="32" rx="8" fill="url(#pv-logo-grad)"/>
        <path d="M8 22V10l8 6-8 6z" fill="white" opacity="0.9"/>
        <path d="M16 22V10l8 6-8 6z" fill="white" opacity="0.6"/>
        <defs><linearGradient id="pv-logo-grad" x1="0" y1="0" x2="32" y2="32">
          <stop stop-color="#6366f1"/><stop offset="1" stop-color="#a855f7"/>
        </linearGradient></defs>
      </svg>
      <span class="pv-navbar__title">ylf_Video</span>
    </a>

    <ul class="pv-navbar__links" role="menubar">
      <li role="none"><a href="/?tab=quick" class="pv-navbar__link" role="menuitem">快捷创作</a></li>
      <li role="none"><a href="/?tab=ai" class="pv-navbar__link" role="menuitem">AI应用</a></li>
      <li role="none"><a href="/workflows" class="pv-navbar__link" role="menuitem">ComfyUI 工作流</a></li>
    </ul>

    <div class="pv-navbar__actions">
      <a href="/history" class="pv-navbar__link">历史</a>
      <a href="/settings" class="pv-navbar__link">设置</a>
      <button class="pv-theme-toggle"
        @click="theme=theme==='dark'?'light':'dark';localStorage.setItem('pv-theme',theme);document.documentElement.setAttribute('data-theme',theme)"
        :aria-label="theme==='dark'?'切换到亮色模式':'切换到暗色模式'" type="button">
        <svg x-show="theme==='dark'" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
        <svg x-show="theme==='light'" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      </button>
    </div>
  </div>
</nav>

{# 分类导航栏 — 独立一行，横向平铺 #}
<nav class="pv-catbar" role="navigation" aria-label="作品分类">
  <div class="pv-catbar__inner">
    <a href="/" class="pv-catbar__link {% if request.url.path == '/' %}pv-catbar__link--active{% endif %}">全部</a>
    {% set cats = [
      ('/category/数字人', '数字人'), ('/category/图片生成', '图片生成'),
      ('/category/视频生成', '视频生成'), ('/category/动作模仿', '动作模仿'),
    ] %}
    {% for url, label in cats %}
    <a href="{{ url }}" class="pv-catbar__link {% if request.url.path == url %}pv-catbar__link--active{% endif %}">{{ label }}</a>
    {% endfor %}
  </div>
</nav>
