{# 筛选栏 — 分类标签组，在父级 x-data="workflowBrowser" 作用域内 #}
<nav class="pv-filter__tabs" role="tablist" aria-label="分类筛选">
  <button class="pv-filter__tab"
    :class="{ 'pv-filter__tab--active': activeCategory === '' }"
    @click="selectCategory('')" role="tab" type="button">全部</button>
  <template x-for="cat in categories" :key="cat">
    <button class="pv-filter__tab"
      :class="{ 'pv-filter__tab--active': activeCategory === cat }"
      @click="selectCategory(cat)" role="tab" type="button"
      x-text="cat === 'image' ? '文生图' : cat === 'video' ? '图生视频' : cat === 'digital_human' ? '数字人' : cat === 'audio' ? '音频' : cat === 'action' ? '动作迁移' : cat === 'analysis' ? '分析' : cat">
    </button>
  </template>
</nav>
