{# 分镜脚本生成页 #}
{% extends "base.html" %}
{% block content %}
<div class="pv-browser">
  <div class="pv-showcase-header">
    <h2 class="pv-showcase__title">分镜脚本生成</h2>
    <p class="pv-showcase__subtitle">输入文章/故事，AI 自动拆解为专业分镜脚本</p>
  </div>

  <div class="pv-notes-form pv-card">
    <textarea id="articleInput" rows="6" placeholder="输入文章或故事内容，AI 将自动生成分镜脚本..."
      class="pv-input pv-input--textarea" style="min-height:150px"></textarea>
    <div class="pv-notes-form__actions">
      <select id="mediaTypeSelect" class="pv-input" style="width:auto;height:44px">
        <option value="image">图片分镜</option>
        <option value="video">视频分镜</option>
      </select>
      <button class="pv-btn-save" id="btnGenerate" style="padding:10px 28px;font-size:16px;height:44px">生成分镜</button>
      <span id="errorMsg" class="pv-text-error"></span>
    </div>
  </div>

  <div id="loadingArea" style="display:none;margin-top:16px">
    <div class="pv-progress"><div class="pv-progress__bar" style="width:60%"></div></div>
    <span style="color:var(--pv-text-muted)">AI 正在分析文章并生成分镜脚本...</span>
  </div>

  <div id="resultArea" style="display:none">
    <div class="pv-showcase-header" style="margin-top:var(--pv-space-8)">
      <h2 class="pv-showcase__title">分镜脚本</h2>
      <span class="pv-showcase__subtitle" id="sceneCount"></span>
    </div>
    <div id="sceneList"></div>
    <div style="display:flex;gap:12px;margin-top:var(--pv-space-6);flex-wrap:wrap">
      <button class="pv-btn-save" id="btnAddScene">添加分镜</button>
      <button class="pv-btn-save" id="btnLock" style="display:none">确认分镜</button>
      <button class="pv-btn-save" id="btnVideo" style="display:none">生成视频</button>
      <span id="lockStatus" style="align-self:center;font-size:14px;color:var(--pv-accent);display:none">🔒 已锁定</span>
    </div>
  </div>
</div>

<script>
(function(){
  const btn = document.getElementById('btnGenerate');
  const articleEl = document.getElementById('articleInput');
  const mediaEl = document.getElementById('mediaTypeSelect');
  const loadingArea = document.getElementById('loadingArea');
  const resultArea = document.getElementById('resultArea');
  const sceneList = document.getElementById('sceneList');
  const sceneCount = document.getElementById('sceneCount');
  const errorEl = document.getElementById('errorMsg');
  let scenesData = [];

  function esc(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

  function renderAllScenes() {
    sceneList.innerHTML = '';
    scenesData.forEach((s, i) => { sceneList.appendChild(buildCard(s, i)); });
    sceneCount.textContent = scenesData.length + ' 个分镜';
    resultArea.style.display = 'block';
    showLockButtons();
    if (locked) {
      sceneList.querySelectorAll('.pv-scene-card').forEach(c => applyLockedState(c));
    }
  }

  function buildCard(s, i) {
    const card = document.createElement('div');
    card.className = 'pv-scene-card pv-card';
    card.dataset.idx = i;
    card.innerHTML = `
      <div class="pv-scene-card__header">
        <span class="pv-scene-card__num">#${i+1}</span>
        <div class="pv-scene-card__actions">
          <button data-action="up" data-idx="${i}" ${i===0?'disabled':''}>↑</button>
          <button data-action="down" data-idx="${i}" ${i===scenesData.length-1?'disabled':''}>↓</button>
          <button data-action="insert" data-idx="${i}">＋</button>
          <button data-action="delete" data-idx="${i}">✕</button>
        </div>
      </div>
      <div class="pv-scene-card__body">
        <label><span>旁白</span>
          <textarea data-field="narration" data-idx="${i}" rows="2" class="pv-input pv-input--textarea">${esc(s.narration)}</textarea>
        </label>
        <label><span>画面提示词</span>
          <textarea data-field="image_prompt" data-idx="${i}" rows="2" class="pv-input pv-input--textarea">${esc(s.image_prompt)}</textarea>
        </label>
      </div>`;
    return card;
  }

  function reindexCards() {
    sceneList.querySelectorAll('.pv-scene-card').forEach((card, i) => {
      card.dataset.idx = i;
      card.querySelector('.pv-scene-card__num').textContent = '#' + (i+1);
      card.querySelectorAll('button[data-action]').forEach(b => { b.dataset.idx = i; });
      card.querySelectorAll('textarea[data-field]').forEach(ta => { ta.dataset.idx = i; });
      card.querySelector('button[data-action="up"]').disabled = (i === 0);
      card.querySelector('button[data-action="down"]').disabled = (i === scenesData.length - 1);
    });
    sceneCount.textContent = scenesData.length + ' 个分镜';
  }

  sceneList.addEventListener('click', function(e) {
    const btn = e.target.closest('button[data-action]');
    if (!btn) return;
    const idx = parseInt(btn.dataset.idx);
    const action = btn.dataset.action;
    const card = btn.closest('.pv-scene-card');

    if (action === 'up' && idx > 0) {
      [scenesData[idx-1], scenesData[idx]] = [scenesData[idx], scenesData[idx-1]];
      card.parentNode.insertBefore(card, card.previousElementSibling);
      reindexCards();
    } else if (action === 'down' && idx < scenesData.length - 1) {
      [scenesData[idx], scenesData[idx+1]] = [scenesData[idx+1], scenesData[idx]];
      card.parentNode.insertBefore(card.nextElementSibling, card);
      reindexCards();
    } else if (action === 'insert') {
      scenesData.splice(idx+1, 0, {narration:'', image_prompt:''});
      const newCard = buildCard({narration:'', image_prompt:''}, idx+1);
      card.parentNode.insertBefore(newCard, card.nextElementSibling);
      reindexCards();
    } else if (action === 'delete') {
      if (scenesData.length <= 1) { errorEl.textContent = '至少保留一个分镜'; return; }
      scenesData.splice(idx, 1);
      card.remove();
      reindexCards();
    }
  });

  sceneList.addEventListener('input', function(e) {
    const ta = e.target.closest('textarea[data-field]');
    if (!ta) return;
    const idx = parseInt(ta.dataset.idx);
    if (scenesData[idx]) scenesData[idx][ta.dataset.field] = ta.value;
  });

  btn.addEventListener('click', async () => {
    const article = articleEl.value.trim();
    const mediaType = mediaEl.value;
    errorEl.textContent = '';
    if (!article) { errorEl.textContent = '请输入文章内容'; return; }

    btn.textContent = '生成中...'; btn.disabled = true;
    loadingArea.style.display = 'block';
    resultArea.style.display = 'none';

    try {
      const r = await fetch('/api/storyboard/generate', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body:JSON.stringify({article, media_type:mediaType})
      });
      const d = await r.json();
      if (!r.ok) throw new Error(d.detail||'生成失败');

      scenesData = (d.scenes||[]).map(s => ({
        narration: s.narration || (typeof s==='string'?s:''),
        image_prompt: Array.isArray(s.image_prompts||s.image_prompt) ? (s.image_prompts||s.image_prompt).join(', ') : (s.image_prompts||s.image_prompt||'')
      }));
      renderAllScenes();
    } catch(e) { errorEl.textContent = e.message; }

    btn.textContent = '生成分镜'; btn.disabled = false;
    loadingArea.style.display = 'none';
  });

  document.getElementById('btnAddScene').addEventListener('click', () => {
    scenesData.push({narration:'', image_prompt:''});
    sceneList.appendChild(buildCard({narration:'', image_prompt:''}, scenesData.length-1));
    sceneCount.textContent = scenesData.length + ' 个分镜';
    resultArea.style.display = 'block';
  });

  let locked = false;
  const btnLock = document.getElementById('btnLock');
  const btnVideo = document.getElementById('btnVideo');
  const lockStatus = document.getElementById('lockStatus');

  function showLockButtons() {
    btnLock.style.display = ''; btnVideo.style.display = '';
    if (locked) {
      btnLock.style.display = 'none';
      lockStatus.style.display = '';
      document.getElementById('btnAddScene').style.display = 'none';
    }
  }

  function applyLockedState(card) {
    if (!locked) return;
    card.querySelectorAll('textarea, button[data-action]').forEach(el => { el.disabled = true; el.style.opacity = '0.6'; });
    card.style.borderLeft = '3px solid var(--pv-accent)';
  }

  btnLock.addEventListener('click', () => {
    locked = true;
    btnLock.style.display = 'none';
    lockStatus.style.display = '';
    document.getElementById('btnAddScene').style.display = 'none';
    // 禁用所有编辑
    sceneList.querySelectorAll('textarea, button[data-action]').forEach(el => {
      el.disabled = true;
      el.style.opacity = '0.6';
    });
    sceneList.querySelectorAll('.pv-scene-card').forEach(card => {
      card.style.borderLeft = '3px solid var(--pv-accent)';
    });
    resultArea.querySelector('.pv-showcase__subtitle').textContent += ' | 已锁定';
  });

  btnVideo.addEventListener('click', async () => {
    if (!locked) { errorEl.textContent = '请先确认分镜'; return; }
    btnVideo.textContent = '生成中...'; btnVideo.disabled = true;
    const narrations = scenesData.map(s => s.narration).filter(Boolean);
    try {
      const r = await fetch('/api/workflows/video_G03_smoothmix/execute', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body:JSON.stringify({prompt:narrations.join('; '), duration:scenesData.length * 5})
      });
      const d = await r.json();
      if (!r.ok) throw new Error(d.detail||'提交失败');
      window.location.href = `/workflow/video_G03_smoothmix?task_id=${d.task_id}`;
    } catch(e) { errorEl.textContent = e.message; }
    btnVideo.textContent = '生成视频'; btnVideo.disabled = false;
  });

  // 首次生成后显示按钮
  const origRenderAll = renderAllScenes;
  renderAllScenes = function() { origRenderAll(); if(scenesData.length) showLockButtons(); };
})();
</script>
{% endblock %}
