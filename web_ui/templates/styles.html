{# 风格模板展示页 #}
{% extends "base.html" %}
{% block content %}
<div class="pv-browser" x-data="stylePicker()">
  <div class="pv-showcase-header">
    <h2 class="pv-showcase__title">风格模板</h2>
    <p class="pv-showcase__subtitle">选择一种风格，应用到分镜生成中</p>
  </div>

  <div class="pv-masonry">
    {% for s in styles %}
    <div class="pv-card pv-style-card"
         :class="{ 'pv-style-card--selected': selected === '{{ s.key }}' }"
         @click="select('{{ s.key }}')">
      <div class="pv-card__thumb">
        <div class="pv-card__thumb-grad" style="background:linear-gradient(135deg,{{ loop.cycle('#667eea,#764ba2','#f093fb,#f5576c') }})"></div>
        <span class="pv-badge" style="position:absolute;top:8px;right:8px">{{ s.name }}</span>
      </div>
      <div class="pv-card__body">
        <h3 class="pv-card__title">{{ s.name }}模板</h3>
        <p class="pv-card__desc">{{ s.desc }}</p>
        <p class="pv-card__date" style="font-size:12px;color:var(--pv-text-faint);margin-top:8px;line-height:1.4">{{ s.prompt_preview }}</p>
        <div class="pv-style-card__check" x-show="selected === '{{ s.key }}'">✓ 已选中</div>
      </div>
    </div>
    {% endfor %}
  </div>

  <div style="display:flex;gap:12px;margin-top:var(--pv-space-8);justify-content:center">
    <button class="pv-btn-save" id="btnConfirm" @click="confirm()" :disabled="!selected">
      确认风格，开始分镜
    </button>
  </div>
</div>

<script>
document.addEventListener('alpine:init', () => {
  Alpine.data('stylePicker', () => ({
    selected: '{{ style_key or "" }}',
    select(key) { this.selected = this.selected === key ? '' : key; },
    confirm() {
      if (!this.selected) return;
      window.location.href = '/storyboard?style=' + this.selected;
    }
  }));
});
</script>
{% endblock %}
