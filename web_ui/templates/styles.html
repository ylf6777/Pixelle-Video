{# 风格模板展示页 #}
{% extends "base.html" %}
{% block content %}
<div class="pv-browser" x-data="stylePicker()">
  <div class="pv-showcase-header">
    <h2 class="pv-showcase__title">画面模板</h2>
    <p class="pv-showcase__subtitle">{{ styles|length }} 种模板</p>
  </div>

  <div class="pv-showcase__cats" style="margin-bottom:20px">
    <button class="pv-showcase__cat pv-showcase__cat--active" @click="filterCat=''">全部</button>
    <button class="pv-showcase__cat" :class="{'pv-showcase__cat--active':filterCat==='图片'}" @click="filterCat='图片'">图片</button>
    <button class="pv-showcase__cat" :class="{'pv-showcase__cat--active':filterCat==='视频'}" @click="filterCat='视频'">视频</button>
    <button class="pv-showcase__cat" :class="{'pv-showcase__cat--active':filterCat==='静态'}" @click="filterCat='静态'">静态</button>
    <button class="pv-showcase__cat" :class="{'pv-showcase__cat--active':filterCat==='其他'}" @click="filterCat='其他'">其他</button>
  </div>

  <div class="pv-masonry">
    {% for s in styles %}
    <div class="pv-card pv-style-card"
         :class="{ 'pv-style-card--selected': selected === '{{ s.key }}' }"
         @click="select('{{ s.key }}')"
         x-show="!filterCat || filterCat==='{{ s.category }}'">
      <div class="pv-card__thumb">
        <div class="pv-card__thumb-grad" style="background:linear-gradient(135deg,{{ loop.cycle('#667eea,#764ba2','#f093fb,#f5576c','#4facfe,#00f2fe','#43e97b,#38f9d7','#fa709a,#fee140') }})"></div>
        <span class="pv-badge pv-badge--{{ s.category }}" style="position:absolute;top:8px;right:8px">{{ s.category }}</span>
      </div>
      <div class="pv-card__body">
        <h3 class="pv-card__title">{{ s.name }}</h3>
        <p class="pv-card__desc">{{ s.desc }}</p>
        <span class="pv-style-card__check" x-show="selected === '{{ s.key }}'">✓ 已选中</span>
      </div>
    </div>
    {% endfor %}
  </div>
</div>

<script>
document.addEventListener('alpine:init', () => {
  Alpine.data('stylePicker', () => ({
    selected: '', filterCat: '',
    select(key) { this.selected = this.selected === key ? '' : key; }
  }));
});
</script>
{% endblock %}
