{# 快捷创作页面 #}
{% extends "base.html" %}
{% block content %}
<div class="pv-quick" x-data="quickCreator()">
  <div class="pv-quick__layout">
    <aside class="pv-quick__sidebar">
      <nav class="pv-quick__tabs" role="tablist">
        <button class="pv-quick__tab pv-quick__tab--active">视频生成</button>
      </nav>
      <div class="pv-quick__params">
        <label class="pv-quick__param">
          <span>时长 (秒)</span>
          <input type="number" x-model="duration" min="3" max="30" value="5" class="pv-input">
        </label>
      </div>
    </aside>

    <main class="pv-quick__main">
      <div class="pv-quick__prompt-area">
        <textarea x-model="prompt" rows="4"
          placeholder="描述你想要生成的视频内容...&#10;&#10;例如：一只可爱的橘猫在阳光下午睡，温暖的光线，4K画质"
          class="pv-quick__prompt"
          @keydown.ctrl.enter="generate()"></textarea>

        <div class="pv-quick__actions">
          <label class="pv-quick__upload">
            <input type="file" accept="image/*" @change="onRefImage"> 📎 参考图
          </label>
          <span class="pv-quick__hint">Ctrl+Enter 快速生成</span>
          <button class="pv-btn pv-btn--gradient pv-btn--lg"
            @click="generate()" :disabled="generating || !prompt.trim()">
            <span x-show="!generating">✦ 生成</span>
            <span x-show="generating">生成中...</span>
          </button>
        </div>
      </div>

      <div class="pv-quick__progress" x-show="generating">
        <div class="pv-progress"><div class="pv-progress__bar" :style="`width:${progress}%`"></div></div>
        <span x-text="statusText"></span>
      </div>

      <div class="pv-quick__results" x-show="results.length > 0">
        <template x-for="(r, i) in results" :key="i">
          <div class="pv-quick__result">
            <video x-show="r.type==='video'" :src="r.url" controls></video>
            <img x-show="r.type==='image'" :src="r.url" alt="生成结果" loading="lazy">
            <div class="pv-quick__result-info">
              <span x-text="r.workflow"></span>
              <span x-text="r.time"></span>
            </div>
          </div>
        </template>
      </div>
    </main>
  </div>
</div>

<script>
document.addEventListener('alpine:init', () => {
  Alpine.data('quickCreator', () => ({
    prompt: '', duration: 5, generating: false, progress: 0, statusText: '',
    results: [], refImage: '',

    onRefImage(e) {
      const f = e.target.files[0];
      if (!f) return;
      const r = new FileReader();
      r.onload = () => { this.refImage = r.result; };
      r.readAsDataURL(f);
    },

    async generate() {
      if (!this.prompt.trim()) return;
      this.generating = true; this.progress = 0; this.statusText = '提交中...';

      const body = { prompt: this.prompt, duration: this.duration };
      if (this.refImage) body.ref_image = this.refImage;

      try {
        const wfId = 'video_G03_smoothmix';
        const r = await fetch(`/api/workflows/${wfId}/execute`, {
          method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(body)
        });
        const d = await r.json();
        if (!r.ok) throw new Error(d.detail || '提交失败');

        this.statusText = '生成中...';
        this.progress = 10;
        const poll = async () => {
          const pr = await fetch(`/api/progress/${d.task_id}?workflow_id=${wfId}`);
          const pd = await pr.json();
          this.progress = pd.progress || this.progress;
          if (pd.status === 'completed') {
            this.generating = false; this.statusText = '完成';
            this.results.unshift({
              type: 'video', url: pd.result_url || '',
              workflow: 'G03 SmoothMix', time: new Date().toLocaleString(),
            });
          } else if (pd.status === 'failed') {
            this.generating = false;
            this.statusText = '失败: ' + (pd.error || '未知错误');
          } else {
            setTimeout(poll, 2000);
          }
        };
        poll();
      } catch(e) {
        this.generating = false; this.statusText = '错误: ' + e.message;
      }
    }
  }));
});
</script>
{% endblock %}
