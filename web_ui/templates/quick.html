{# 快捷创作页面 #}
{% extends "base.html" %}
{% block content %}
<div class="pv-quick" x-data="quickCreator()">
  <div class="pv-quick__layout">
    <aside class="pv-quick__sidebar">
      <nav class="pv-quick__tabs" role="tablist">
        <button class="pv-quick__tab" :class="{ 'pv-quick__tab--active': mode === 'image' }"
          @click="mode='image'">图片生成</button>
        <button class="pv-quick__tab" :class="{ 'pv-quick__tab--active': mode === 'video' }"
          @click="mode='video'">视频生成</button>
        <button class="pv-quick__tab" :class="{ 'pv-quick__tab--active': mode === 'digital' }"
          @click="mode='digital'">数字人</button>
        <button class="pv-quick__tab" :class="{ 'pv-quick__tab--active': mode === 'action' }"
          @click="mode='action'">动作模仿</button>
      </nav>
      <div class="pv-quick__params">
        <label class="pv-quick__param">
          <span>工作流</span>
          <select x-model="workflowId" class="pv-input">
            <option value="video_G03_smoothmix" selected>G03 SmoothMix (已验证)</option>
          </select>
        </label>
        <label class="pv-quick__param" x-show="mode==='video'||mode==='digital'">
          <span>时长 (秒)</span>
          <input type="number" x-model="duration" min="3" max="30" value="5" class="pv-input">
        </label>
      </div>
    </aside>

    <main class="pv-quick__main">
      {# 提示词 #}
      <div class="pv-quick__prompt-area">
        <textarea x-model="prompt" rows="4"
          placeholder="描述你想要生成的内容..."
          class="pv-quick__prompt"
          @keydown.ctrl.enter="generate()"></textarea>

        {# 上传区域 #}
        <div class="pv-quick__uploads">
          {# 参考图1 #}
          <label class="pv-quick__upload" x-show="needsRefImage">
            <input type="file" accept="image/*" @change="onRefImage(1,$event)"> 参考图1
          </label>
          {# 参考图2 — 与参考图1完全一致的逻辑 #}
          <label class="pv-quick__upload" x-show="needsRefImage">
            <input type="file" accept="image/*" @change="onRefImage(2,$event)"> 参考图2
          </label>
          {# 参考视频 #}
          <label class="pv-quick__upload" x-show="needsRefVideo">
            <input type="file" accept="video/mp4,video/quicktime,video/webm" @change="onRefVideo"> 参考视频
            <span x-show="videoName" x-text="videoName" class="pv-quick__upload-name"></span>
          </label>
        </div>

        <div class="pv-quick__actions">
          <span class="pv-quick__hint">Ctrl+Enter 快速生成</span>
          <button class="pv-btn-save" @click="generate()" :disabled="generating || !prompt.trim()">
            <span x-text="generating ? '生成中...' : '生成'"></span>
          </button>
        </div>

        {# 参考图预览 #}
        <div class="pv-quick__refs" x-show="ref1Preview || ref2Preview">
          <img x-show="ref1Preview" :src="ref1Preview" class="pv-quick__ref-thumb" alt="参考图1">
          <img x-show="ref2Preview" :src="ref2Preview" class="pv-quick__ref-thumb" alt="参考图2">
        </div>
      </div>

      {# 视频上传进度 #}
      <div class="pv-upload-progress" x-show="videoUploading">
        <div class="pv-progress"><div class="pv-progress__bar" :style="`width:${videoProgress}%`"></div></div>
        <span x-text="videoStatus"></span>
      </div>

      {# 生成进度 #}
      <div class="pv-quick__progress" x-show="generating">
        <div class="pv-progress"><div class="pv-progress__bar" :style="`width:${progress}%`"></div></div>
        <span x-text="statusText"></span>
      </div>

      {# 预览窗口 #}
      <div class="pv-preview-window" x-show="previewVisible">
        <div class="pv-preview-window__toolbar">
          <button @click="zoomIn" title="放大">+</button>
          <button @click="zoomOut" title="缩小">-</button>
          <button @click="zoomReset" title="重置">1:1</button>
          <button @click="previewVisible=false" title="关闭">✕</button>
        </div>
        <div class="pv-preview-window__content" :style="`transform:scale(${previewZoom})`">
          <div class="pv-preview-window__loading" x-show="previewLoading">生成中...</div>
          <img x-show="previewType==='image' && !previewLoading" :src="previewUrl" alt="预览">
          <video x-show="previewType==='video' && !previewLoading" :src="previewUrl" controls autoplay loop></video>
          <div class="pv-preview-window__error" x-show="previewError" x-text="previewError"></div>
        </div>
      </div>

      {# 结果展示 #}
      <div class="pv-quick__results" x-show="results.length > 0">
        <template x-for="(r, i) in results" :key="i">
          <div class="pv-quick__result" @click="openPreview(r)">
            <img x-show="r.type==='image'" :src="r.url" alt="生成结果" loading="lazy">
            <video x-show="r.type==='video'" :src="r.url" muted></video>
            <div class="pv-quick__result-info">
              <span x-text="r.workflow"></span><span x-text="r.time"></span>
            </div>
          </div>
        </template>
      </div>
    </main>
  </div>
</div>

<script>
document.addEventListener('alpine:init', () => {
  Alpine.data('quickCreator', () => ({
    mode: 'video', prompt: '', workflowId: 'video_G03_smoothmix', duration: 5,
    generating: false, progress: 0, statusText: '', results: [],
    ref1Base64: '', ref1Preview: '', ref2Base64: '', ref2Preview: '',
    refVideoFile: null, videoName: '', videoUploading: false, videoProgress: 0, videoStatus: '',
    previewVisible: false, previewUrl: '', previewType: 'image', previewZoom: 1,
    previewLoading: false, previewError: '',

    get needsRefImage() { return this.mode === 'video' || this.mode === 'digital' || this.mode === 'action'; },
    get needsRefVideo() { return this.mode === 'action'; },

    onRefImage(slot, e) {
      const f = e.target.files[0]; if (!f) return;
      if (f.size > 50*1024*1024) { alert('图片不能超过50MB'); return; }
      const r = new FileReader();
      r.onload = () => {
        if (slot === 1) { this.ref1Base64 = r.result; this.ref1Preview = r.result; }
        else { this.ref2Base64 = r.result; this.ref2Preview = r.result; }
      };
      r.readAsDataURL(f);
    },

    onRefVideo(e) {
      const f = e.target.files[0]; if (!f) return;
      const allowed = ['video/mp4','video/quicktime','video/webm'];
      if (!allowed.includes(f.type)) { alert('仅支持 MP4、MOV、WebM 格式'); return; }
      if (f.size > 200*1024*1024) { alert('视频不能超过200MB'); return; }
      this.refVideoFile = f; this.videoName = f.name;
      this.videoUploading = true; this.videoProgress = 0; this.videoStatus = '上传中...';
      let prog = 0;
      const timer = setInterval(() => {
        prog += 15; this.videoProgress = Math.min(prog, 90);
        if (prog >= 90) clearInterval(timer);
      }, 200);
      setTimeout(() => { clearInterval(timer); this.videoProgress = 100;
        this.videoStatus = '就绪'; this.videoUploading = false; }, 1500);
    },

    openPreview(r) {
      this.previewUrl = r.url; this.previewType = r.type;
      this.previewVisible = true; this.previewZoom = 1;
      this.previewLoading = false; this.previewError = '';
    },
    zoomIn() { this.previewZoom = Math.min(this.previewZoom + 0.25, 3); },
    zoomOut() { this.previewZoom = Math.max(this.previewZoom - 0.25, 0.25); },
    zoomReset() { this.previewZoom = 1; },

    async generate() {
      if (!this.prompt.trim()) return;
      this.generating = true; this.progress = 0; this.statusText = '提交中...';
      const wfId = this.workflowId || 'video_G03_smoothmix';
      const body = { prompt: this.prompt, duration: this.duration };
      if (this.ref1Base64) body.ref_image = this.ref1Base64;
      if (this.ref2Base64) body.ref_image2 = this.ref2Base64;

      try {
        const r = await fetch(`/api/workflows/${wfId}/execute`, {
          method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(body)
        });
        const d = await r.json();
        if (!r.ok) throw new Error(d.detail || '提交失败');
        this.progress = 10; this.statusText = '生成中...';
        const poll = async () => {
          const pr = await fetch(`/api/progress/${d.task_id}?workflow_id=${wfId}`);
          const pd = await pr.json();
          this.progress = pd.progress || this.progress;
          if (pd.status === 'completed') {
            this.generating = false; this.statusText = '完成';
            const resultUrl = pd.result_url || '';
            this.results.unshift({ type: 'video', url: resultUrl, workflow: 'G03 SmoothMix', time: new Date().toLocaleString() });
            if (resultUrl) { this.openPreview({ url: resultUrl, type: 'video' }); }
          } else if (pd.status === 'failed') {
            this.generating = false; this.statusText = '失败';
            this.previewError = pd.error || '生成失败';
          } else { setTimeout(poll, 2000); }
        };
        poll();
      } catch(e) { this.generating = false; this.statusText = e.message; }
    }
  }));
});
</script>
{% endblock %}
