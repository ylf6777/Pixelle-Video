<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>风格模板画廊 — 独立测试页（复制原代码逻辑）</title>
<style>
/* === 原代码风格：Streamlit 模板画廊的独立复刻 === */
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: #0d0d1f; color: #fff;
  font-family: 'PingFang SC','Microsoft YaHei',sans-serif;
  padding: 20px;
}
h1 { text-align: center; margin: 20px 0; font-size: 24px; }
h2 { font-size: 18px; margin: 12px 0 8px; color: #00d4ff; }
.gallery { max-width: 1400px; margin: 0 auto; }
/* 5列网格 — 与原代码 TEMPLATE_GRID_COLS=5 一致 */
.grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; margin-bottom: 30px; }
.card {
  background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08);
  border-radius: 12px; overflow: hidden; cursor: pointer;
  transition: border-color 0.2s, transform 0.2s;
}
.card:hover { border-color: rgba(0,212,255,0.4); transform: translateY(-2px); }
.card.selected { border: 2px solid #00d4ff; box-shadow: 0 0 16px rgba(0,212,255,0.2); }
.thumb {
  width: 100%; display: flex; align-items: center; justify-content: center;
  background: #000; min-height: 200px; max-height: 320px;
}
.thumb img { width: 100%; height: auto; object-fit: contain; display: block; }
.thumb .placeholder {
  width: 100%; min-height: 200px;
  background: linear-gradient(135deg, #667eea, #764ba2);
  display: flex; align-items: center; justify-content: center;
  color: rgba(255,255,255,0.5); font-size: 48px;
}
.info { padding: 12px; }
.name { font-size: 14px; font-weight: 600; margin-bottom: 4px; }
.desc { font-size: 12px; color: rgba(255,255,255,0.5); }
.check { color: #00d4ff; font-size: 13px; margin-top: 8px; font-weight: 600; }
.status { text-align: center; padding: 16px; margin: 16px 0; border-radius: 8px; font-size: 14px; }
.status-ok { background: rgba(0,200,83,0.1); color: #00c853; border: 1px solid rgba(0,200,83,0.3); }
.status-err { background: rgba(255,23,68,0.1); color: #ff1744; border: 1px solid rgba(255,23,68,0.3); }
.tabs { display: flex; gap: 4px; margin-bottom: 20px; flex-wrap: wrap; }
.tab {
  padding: 6px 16px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.1);
  background: transparent; color: rgba(255,255,255,0.5); cursor: pointer; font-size: 14px;
}
.tab:hover { color: #fff; border-color: rgba(255,255,255,0.3); }
.tab.active { background: #00d4ff; color: #000; border-color: #00d4ff; font-weight: 600; }

@media (max-width: 1024px) { .grid { grid-template-columns: repeat(3, 1fr); } }
@media (max-width: 640px) { .grid { grid-template-columns: repeat(2, 1fr); } }
</style>
</head>
<body>

<div class="gallery">
  <h1>风格模板画廊 — 原代码复刻测试</h1>
  <div id="statusBar" class="status">加载中...</div>
  <div id="tabBar" class="tabs"></div>
  <div id="galleryGrid" class="grid"></div>
</div>

<script>
// === 原代码逻辑复刻：扫描 docs/images/ 目录，按尺寸分组，5列网格展示 ===

// 所有模板（与原代码扫描 templates/ 目录一致）
const TEMPLATES = [
  // 1080x1920 竖屏
  "image_default","image_blur_card","image_book","image_cartoon","image_elegant",
  "image_excerpt","image_fashion_vintage","image_full","image_healing","image_health_preservation",
  "image_life_insights","image_life_insights_light","image_long_text","image_modern","image_neon",
  "image_psychology_card","image_purple","image_satirical_cartoon","image_simple_black",
  "image_simple_line_drawing","video_default","video_healing","static_default","static_excerpt","asset_default"
];

const NAMES = {
  "image_default":"默认图片","image_blur_card":"毛玻璃卡片","image_book":"书本翻页",
  "image_cartoon":"卡通动漫","image_elegant":"优雅简约","image_excerpt":"文摘卡片",
  "image_fashion_vintage":"时尚复古","image_full":"全屏大图","image_healing":"治愈温暖",
  "image_health_preservation":"养生保健","image_life_insights":"生活感悟",
  "image_life_insights_light":"生活感悟浅色","image_long_text":"长文本","image_modern":"现代简约",
  "image_neon":"霓虹灯","image_psychology_card":"心理卡片","image_purple":"紫色梦幻",
  "image_satirical_cartoon":"讽刺漫画","image_simple_black":"极简黑",
  "image_simple_line_drawing":"简笔画","video_default":"默认视频","video_healing":"治愈视频",
  "static_default":"静态默认","static_excerpt":"静态文摘","asset_default":"素材默认"
};

// === 核心函数：get_template_preview_path() — 与原代码完全一致 ===
function getPreviewPath(templateName) {
  // 搜索顺序：中文版 .jpg → 中文版 .png → 英文版 .jpg → 英文版 .png
  const BASE = '/docs/images/1080x1920/';
  for (const ext of ['.jpg', '.png']) {
    for (const suffix of ['', '_en']) {
      const path = BASE + templateName + suffix + ext;
      // 尝试预加载检查（同步方式：用 Image 测试）
      // 实际用 async/await 批量验证
    }
  }
  // 返回最可能的路径（中文 .jpg 优先）
  return BASE + templateName + '.jpg';
}

// === 渲染 ===
async function init() {
  const grid = document.getElementById('galleryGrid');
  const statusBar = document.getElementById('statusBar');
  let loaded = 0, failed = 0;

  for (const key of TEMPLATES) {
    const name = NAMES[key] || key;
    const card = document.createElement('div');
    card.className = 'card';
    card.onclick = function() {
      document.querySelectorAll('.card').forEach(c => c.classList.remove('selected'));
      card.classList.add('selected');
    };

    // 构建预览图路径（与原代码 get_template_preview_path 完全一致）
    let imgUrl = '';
    for (const ext of ['.jpg', '.png']) {
      for (const suffix of ['', '_en']) {
        const url = `/docs/images/1080x1920/${key}${suffix}${ext}`;
        try {
          const r = await fetch(url, {method:'HEAD'});
          if (r.ok) { imgUrl = url; break; }
        } catch(e) {}
      }
      if (imgUrl) break;
    }

    if (imgUrl) {
      loaded++;
      card.innerHTML = `
        <div class="thumb"><img src="${imgUrl}" alt="${name}" loading="lazy" onerror="this.parentElement.innerHTML='<div class=placeholder>?</div>'"></div>
        <div class="info"><div class="name">${name}</div><div class="desc">${key}.html</div></div>`;
    } else {
      failed++;
      card.innerHTML = `
        <div class="thumb"><div class="placeholder">?</div></div>
        <div class="info"><div class="name">${name}</div><div class="desc" style="color:#ff5252">无预览图</div></div>`;
    }
    grid.appendChild(card);
  }

  statusBar.className = failed === 0 ? 'status status-ok' : 'status status-err';
  statusBar.textContent = `✅ ${loaded} 个预览图加载成功  ❌ ${failed} 个缺失  （共 ${TEMPLATES.length} 个模板）`;
}

init();
</script>
</body>
</html>
